<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Blogs | Marketonex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f5f5f5;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #4f46e5;
            --expert-color: #fbbf24;
            --border-radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Container & Header */
        .blog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .blog-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        .blog-header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* 3-Column Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            opacity: 0; /* For fade-in animation */
        }

        /* Card Design */
        .blog-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            cursor: pointer;
            transition: transform var(--transition), box-shadow var(--transition);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Image & Overlay */
        .card-image-wrapper {
            position: relative;
            width: 100%;
            height: 240px;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition);
        }

        .blog-card:hover .card-image {
            transform: scale(1.05); /* Slight zoom-in */
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 2rem 1.5rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: flex-end;
        }

        .category-badge {
            background: var(--primary);
            color: white;
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Card Content */
        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-excerpt {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            flex: 1;
            /* Simple truncating */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1.25rem;
            border-top: 1px solid #f3f4f6;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .writer-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
        }

        .expert-badge {
            color: #d97706; /* Darker amber for text contrast */
            background-color: #fef3c7;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .tags-container {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .tagItem {
            font-size: 0.75rem;
            color: var(--primary);
            background: #eef2ff;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-weight: 500;
        }

        /* Utilities & Animations */
        .fade-in-up {
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        
        .loader {
            border: 3px solid rgba(79, 70, 229, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 3rem;
            background: #fef2f2;
            color: #991b1b;
            border-radius: var(--border-radius);
            margin-top: 2rem;
        }

        /* Responsiveness */
        @media (max-width: 1024px) {
            .blog-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .blog-grid {
                grid-template-columns: 1fr;
            }
            .blog-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="blog-container">
        <header class="blog-header fade-in-up">
            <h1>Our Insights & Articles</h1>
            <p>Explore expert tips, market trends, and strategies designed for success.</p>
        </header>

        <!-- Loading Indicator -->
        <div class="loading-state" id="loadingState">
            <div class="loader"></div>
            <p>Fetching latest blogs...</p>
        </div>

        <!-- Error Message -->
        <div class="error-state" id="errorState" style="display: none;">
            <h3>Oops, something went wrong.</h3>
            <p id="errorText">Could not load the blogs.</p>
        </div>

        <!-- Blog Grid -->
        <div class="blog-grid" id="blogGrid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchBlogs();
        });

        async function fetchBlogs() {
            const grid = document.getElementById('blogGrid');
            const loader = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const errorText = document.getElementById('errorText');

            // Use exactly /get-blogs as requested
            const API_BASE = window.location.protocol === 'file:' 
                                ? 'http://127.0.0.1:5000' 
                                : '';
            const ENDPOINT = `${API_BASE}/get-blogs`;

            try {
                // Fetch dynamic data
                const response = await fetch(ENDPOINT);
                
                // If endpoint missing, let's gracefully load dummy data for Visual Demonstration
                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}`);
                }

                const data = await response.json();
                
                // Extract blogs array based on common JSON structures
                const blogs = Array.isArray(data) ? data : (data.blogs || data.data || []);
                
                loader.style.display = 'none';

                if (blogs.length === 0) {
                    errorText.textContent = "No blogs published yet. Check back later!";
                    errorState.style.display = 'block';
                    return;
                }

                renderBlogs(blogs, grid);

            } catch (error) {
                console.error("Error fetching blogs:", error);
                loader.style.display = 'none';
                
                // Show graceful error state
                errorText.textContent = `Unable to connect to the server (${error.message}). Please try again later.`;
                errorState.style.display = 'block';
            }
        }

        function renderBlogs(blogs, container) {
            container.innerHTML = ''; // clear grid

            blogs.forEach((blog, index) => {
                // 1. Strip HTML tags safely for the excerpt
                const tmpDiv = document.createElement("div");
                tmpDiv.innerHTML = blog.content || '';
                const cleanText = tmpDiv.textContent || tmpDiv.innerText || "";
                
                // Truncate text (around 120-150 characters)
                const excerpt = cleanText.length > 130 
                                ? cleanText.substring(0, 130) + '...' 
                                : cleanText;

                // 2. Parse Tags safely
                let tagsHtml = '';
                if (blog.tags) {
                    let parsedTags = [];
                    try {
                        parsedTags = typeof blog.tags === 'string' ? JSON.parse(blog.tags) : blog.tags;
                    } catch(e) {
                        // Fallback if tags is just a comma-separated string
                        parsedTags = typeof blog.tags === 'string' ? blog.tags.split(',').map(t => t.trim()) : [];
                    }

                    if (Array.isArray(parsedTags) && parsedTags.length > 0) {
                        // Show max 3 tags
                        tagsHtml = `<div class="tags-container">` + 
                            parsedTags.slice(0, 3).map(tag => `<span class="tagItem">#${tag}</span>`).join('') +
                        `</div>`;
                    }
                }

                // 3. Image Handling (Lazy loading + Fallback)
                const fallbackImage = 'https://images.unsplash.com/photo-1542435503-956c469947f6?auto=format&fit=crop&q=80&w=800';
                const imageUrl = blog.image 
                                ? (blog.image.startsWith('http') ? blog.image : `/static/images/${blog.image}`) 
                                : fallbackImage;

                // 4. Expert Badge
                const isExpert = blog.expert === true || blog.expert === 'true' || blog.expert === 1;
                const expertHtml = isExpert ? `<span class="expert-badge">⭐ Expert</span>` : '';

                // 5. Build Final Card Element
                const card = document.createElement('a');
                card.href = `/blog/${blog.id || index}`;
                card.className = 'blog-card';
                card.innerHTML = `
                    <div class="card-image-wrapper">
                        <img src="${imageUrl}" alt="${blog.title}" class="card-image" loading="lazy" onerror="this.src='${fallbackImage}'">
                        <div class="image-overlay">
                            ${blog.category ? `<span class="category-badge">${blog.category}</span>` : ''}
                        </div>
                    </div>
                    <div class="card-content">
                        ${tagsHtml}
                        <h2 class="card-title">${blog.title || 'Untitled Blog'}</h2>
                        <p class="card-excerpt">${excerpt || 'No summary available.'}</p>
                        
                        <div class="card-footer">
                            <span class="writer-info">
                                <span style="font-weight: 600;">${blog.writer || 'Anonymous'}</span>
                            </span>
                            ${expertHtml}
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });

            // Trigger grid fade-in animation
            setTimeout(() => {
                container.style.opacity = '1';
                container.classList.add('fade-in-up');
            }, 100);
        }
    </script>
</body>
</html>
