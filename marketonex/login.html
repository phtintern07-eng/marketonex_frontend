<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Smart Site System</title>
    <link rel="stylesheet" href="css/login.css">
    <!-- Google Fonts for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .input-group {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 40px;
            /* Adjust based on label height */
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 1rem;
            padding: 0;
            outline: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Left Side: Image/Visual -->
        <div class="visual-side">
            <div class="visual-content">
                <!-- Image is set via CSS background -->
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="form-side">
            <div class="form-container">
                <button class="btn-back"
                    onclick="if(window.history.length > 1) { window.history.back(); } else { window.location.href='marketonex.html'; }">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor" />
                    </svg>
                    Back
                </button>
                <h1>Sign In</h1>
                <p class="subtitle">Welcome back! Please login to your account.</p>

                <form action="#" method="POST" id="loginForm">
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="checkbox-group" style="justify-content: space-between;">
                        <div>
                            <!-- Remember me could go here -->
                        </div>
                        <a href="#" style="color: #007bff; text-decoration: none; font-size: 0.9rem;">Forgot
                            password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Sign In</button>

                    <!-- Hidden Verify Email Button -->
                    <button type="button" id="verifyEmailBtn" class="btn-primary"
                        style="display:none; margin-top: 10px; background: #28a745;">
                        📧 Verify Email
                    </button>

                </form>

                <div class="login-link">
                    Don't have an account? <a href="signup.html">Create one</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
