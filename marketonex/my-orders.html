<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Marketonex</title>
    <link rel="stylesheet" href="css/marketonex.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .orders-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .page-header p {
            color: var(--text-color);
            opacity: 0.7;
            font-size: 1.1em;
        }

        .orders-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: white;
        }

        .order-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .order-card:hover {
            box-shadow: 0 8px 24px var(--shadow-medium);
            transform: translateY(-2px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .order-id {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--primary-color);
        }

        .order-date {
            color: var(--text-color);
            opacity: 0.7;
            font-size: 0.9em;
        }

        .order-status {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(251, 191, 36, 0.2);
            color: #f59e0b;
        }

        .status-confirmed {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .status-shipped {
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
        }

        .status-delivered {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .order-items {
            margin-bottom: 20px;
        }

        .order-item {
            display: flex;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--tag-bg);
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .item-quantity {
            color: var(--text-color);
            opacity: 0.7;
            font-size: 0.9em;
        }

        .item-price {
            font-weight: 600;
            color: var(--primary-color);
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
        }

        .order-total {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--text-color);
        }

        .order-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-secondary {
            background: var(--tag-bg);
            color: var(--text-color);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow-light);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state i {
            font-size: 4em;
            color: var(--primary-color);
            opacity: 0.3;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .empty-state p {
            color: var(--text-color);
            opacity: 0.7;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .orders-container {
                padding: 0 20px;
            }

            .order-header {
                flex-direction: column;
                gap: 10px;
            }

            .order-footer {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }

            .order-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <h1 class="logo">Marketonex</h1>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search orders...">
            </div>
            <div class="actions">
                <a href="marketonex.html" class="back-btn" style="text-decoration: none; color: inherit;">
                    <i class="fas fa-arrow-left"></i> Back to Marketonex
                </a>
                <a href="cart.html" class="cart-icon-link">
                    <div class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-badge" class="cart-badge">0</span>
                    </div>
                </a>
                <!-- Profile Icon (reuse from marketonex) -->
                <div class="profile-container">
                    <button id="profile-icon-btn" class="profile-icon" aria-label="User Profile">
                        <img id="profile-avatar" src="" alt="Profile" class="profile-avatar hidden">
                        <div id="profile-initials" class="profile-initials"></div>
                    </button>
                </div>
                <div class="theme-toggle">
                    <button id="theme-toggle-btn" aria-label="Toggle theme">
                        <i class="fas fa-sun"></i>
                    </button>
                    <div id="theme-dropdown" class="dropdown-menu hidden">
                        <button data-theme="light">Light</button>
                        <button data-theme="dark">Dark</button>
                        <button data-theme="brown">Brown</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="orders-container">
        <div class="page-header">
            <h1>My Orders</h1>
            <p>Track, manage, and review your order history</p>
        </div>

        <div class="orders-filter">
            <button class="filter-btn active" data-filter="all">All Orders</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="confirmed">Confirmed</button>
            <button class="filter-btn" data-filter="shipped">Shipped</button>
            <button class="filter-btn" data-filter="delivered">Delivered</button>
        </div>

        <div id="orders-list">
            <!-- Orders will be dynamically loaded here -->
            <div class="empty-state">
                <i class="fas fa-box-open"></i>
                <h2>Loading your orders...</h2>
                <p>Please wait while we fetch your order history</p>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Theme handling
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);

            // Theme toggle functionality
            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            const themeDropdown = document.getElementById('theme-dropdown');

            if (themeToggleBtn && themeDropdown) {
                themeToggleBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    themeDropdown.classList.toggle('hidden');
                });

                themeDropdown.querySelectorAll('button').forEach(button => {
                    button.addEventListener('click', () => {
                        const theme = button.getAttribute('data-theme');
                        document.body.setAttribute('data-theme', theme);
                        localStorage.setItem('theme', theme);
                        themeDropdown.classList.add('hidden');
                    });
                });

                document.addEventListener('click', (e) => {
                    if (!themeToggleBtn.contains(e.target) && !themeDropdown.contains(e.target)) {
                        themeDropdown.classList.add('hidden');
                    }
                });
            }

            // Load orders
            await loadOrders();

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterOrders(btn.dataset.filter);
                });
            });
        });

        let allOrders = [];

        async function loadOrders() {
            const ordersList = document.getElementById('orders-list');

            // Show loading spinner
            ordersList.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h2>Loading your orders...</h2>
                </div>
            `;

            try {
                // Fetch orders from backend — no-cache to always get fresh data
                const response = await fetch('/api/orders?source=marketonex', {
                    credentials: 'include',
                    headers: { 'Cache-Control': 'no-cache, no-store' }
                });

                console.log('[MyOrders] /api/orders response status:', response.status);

                // Not logged in → redirect to marketonex login
                if (response.status === 401) {
                    window.location.href = 'login.html?redirect=' +
                        encodeURIComponent(window.location.pathname);
                    return;
                }

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || `Server error ${response.status}`);
                }

                const data = await response.json();
                console.log('[MyOrders] API response:', data);
                allOrders = data.orders || [];
                console.log('[MyOrders] Orders count:', allOrders.length);

                if (allOrders.length === 0) {
                    ordersList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open"></i>
                            <h2>No orders yet</h2>
                            <p>Start shopping to see your orders here</p>
                            <a href="marketonex.html" class="action-btn btn-primary" style="display: inline-block; text-decoration: none;">
                                Browse Products
                            </a>
                        </div>
                    `;
                    return;
                }

                renderOrders(allOrders);
            } catch (error) {
                console.error('Error loading orders:', error);
                ordersList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <h2>Failed to load orders</h2>
                        <p>${error.message}</p>
                        <button class="action-btn btn-primary" onclick="loadOrders()">Retry</button>
                    </div>
                `;
            }
        }



        function renderOrders(orders) {
            const ordersList = document.getElementById('orders-list');

            if (orders.length === 0) {
                ordersList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-filter"></i>
                        <h2>No orders found</h2>
                        <p>Try adjusting your filters</p>
                    </div>
                `;
                return;
            }

            ordersList.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">#${order.order_id}</div>
                            <div class="order-date">${new Date(order.created_at).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            })}</div>
                        </div>
                        <span class="order-status status-${order.status}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span>
                    </div>

                    <div class="order-items">
                        ${(order.items || []).map(item => `
                            <div class="order-item">
                                <div class="item-details">
                                    <div class="item-name">${item.product_name}</div>
                                    <div class="item-quantity">Quantity: ${item.quantity}</div>
                                </div>
                                <div class="item-price">₹${parseFloat(item.price).toFixed(2)}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="order-footer">
                        <div class="order-total">Total: ₹${parseFloat(order.total).toFixed(2)}</div>
                        <div class="order-actions">
                            <button class="action-btn btn-secondary" onclick="viewOrderDetails('${order.order_id}')">
                                <i class="fas fa-eye"></i> View Details
                            </button>
                            ${order.status === 'delivered' ? `
                                <button class="action-btn btn-primary" onclick="reorder('${order.order_id}')">
                                    <i class="fas fa-redo"></i> Buy Again
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterOrders(status) {
            if (status === 'all') {
                renderOrders(allOrders);
            } else {
                const filtered = allOrders.filter(order => order.status === status);
                renderOrders(filtered);
            }
        }

        function viewOrderDetails(orderId) {
            // Navigate to order details page or show modal
            alert(`View details for order ${orderId}`);
            // TODO: Implement order details page
        }

        function reorder(orderId) {
            const order = allOrders.find(o => o.order_id === orderId);
            if (order && order.items) {
                // Add items to cart
                alert(`Adding ${order.items.length} items to cart...`);
                // TODO: Implement add to cart functionality
            }
        }
    </script>
</body>

</html>
