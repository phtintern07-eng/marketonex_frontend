<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Smart Site System</title>
    <link rel="stylesheet" href="css/login.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Left Side: Image/Visual -->
        <div class="visual-side">
            <div class="visual-content">
                <!-- Image is set via CSS background -->
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="form-side">
            <div class="form-container">
                <div style="text-align: right; margin-bottom: 10px;">
                    <a href="../index.html" style="color: #007bff; text-decoration: none; font-size: 0.9rem;">← Back
                        to Home</a>
                </div>
                <h1>Sign In</h1>
                <p class="subtitle">Welcome back! Please login to your account.</p>

                <form action="#" method="POST" id="loginForm">
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email"
                            required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="••••••••••••"
                                autocomplete="current-password" required>
                            <i class="fas fa-eye toggle-password" title="Show/Hide password"></i>
                        </div>
                    </div>

                    <div class="checkbox-group" style="justify-content: space-between;">
                        <div>
                            <!-- Remember me could go here -->
                        </div>
                        <a href="#" style="color: #007bff; text-decoration: none; font-size: 0.9rem;">Forgot
                            password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Sign In</button>

                </form>

                <div class="login-link">
                    Don't have an account? <a href="signup.html">Create one</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
