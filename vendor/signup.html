<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Smart Site System</title>
    <link rel="stylesheet" href="css/login.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Left Side: Image/Visual -->
        <div class="visual-side">
            <div class="visual-content">
                <!-- Image is set via CSS background -->
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="form-side">
            <div class="form-container">
                <div style="text-align: right; margin-bottom: 10px;">
                    <a href="../index.html" style="color: #007bff; text-decoration: none; font-size: 0.9rem;">← Back
                        to Home</a>
                </div>
                <h1>Create Account</h1>
                <p class="subtitle">Join us to experience the best PC hardware marketplace.</p>

                <form action="#" method="POST" id="signupForm">
                    <div class="input-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                        <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
                            <button type="button" id="sendVerificationBtn" class="btn-primary"
                                style="padding:8px 14px; font-size:0.85rem; flex:1;">Send Verification</button>
                            <button type="button" id="checkVerificationBtn" class="btn-primary"
                                style="padding:8px 14px; font-size:0.85rem; flex:1; background:#6c757d;">Check
                                Verification Status</button>
                        </div>
                        <div id="verificationStatus"
                            style="margin-top:8px; font-size:0.88rem; padding:8px 12px; border-radius:6px; display:none;">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="••••••••••••" required>
                            <i class="fas fa-eye toggle-password" title="Show/Hide password"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••••••"
                                required>
                            <i class="fas fa-eye toggle-password" title="Show/Hide password"></i>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="#" style="color:#007bff;text-decoration:none;">terms
                                of service</a></label>
                    </div>

                    <button type="submit" class="btn-primary">Sign Up</button>

                </form>

                <div class="login-link">
                    Already a member? <a href="loginvender.html">Sign in</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/signup.js"></script>
</body>

</html>
