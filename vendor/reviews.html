<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendorVerse - Customer Reviews</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/reviews.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-layer-group"></i>
            <span>VendorVerse</span>
        </div>
        <nav class="nav-menu">
            <a href="vender_profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>My Profile</span>
            </a>
            <a href="products.html" class="nav-item">
                <i class="fas fa-box"></i>
                <span>My Products</span>
            </a>
            <a href="orders.html" class="nav-item">
                <i class="fas fa-shopping-cart"></i>
                <span>Orders</span>
            </a>
            <a href="insights.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Insights</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
            <a href="verification.html" class="nav-item">
                <i class="fas fa-shield-alt"></i>
                <span>Verification</span>
            </a>
            <a href="reviews.html" class="nav-item active">
                <i class="fas fa-star"></i>
                <span>Reviews</span>
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <!-- Theme Switcher -->
            <div class="theme-controls">
                <button class="theme-btn" id="themeBtn">
                    <i class="fas fa-cog"></i>
                </button>
                <div class="theme-menu" id="themeMenu">
                    <div class="theme-option active" data-value="light">
                        <span>Light</span>
                    </div>
                    <div class="theme-option" data-value="dark">
                        <span>Dark</span>
                    </div>
                    <div class="theme-option" data-value="brown">
                        <span>Brown</span>
                    </div>
                </div>
            </div>

            <a href="user-info.html" class="user-avatar">
                <img src="https://i.pravatar.cc/150?img=12" alt="User">
            </a>
        </div>

        <!-- Reviews Content -->
        <div class="reviews-page-container">
            <div class="reviews-header">
                <div>
                    <h1>Customer Reviews</h1>
                    <p class="page-subtitle">See what customers are saying about your products.</p>
                </div>
            </div>

            <!-- Stats Overview - 3D Card -->
            <div class="reviews-stats-card-3d">
                <div class="rating-display-3d">
                    <h2 id="avgRatingBig">0.0</h2>
                    <div class="stars-large" id="avgStarsBig">
                        <i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i
                            class="far fa-star"></i><i class="far fa-star"></i>
                    </div>
                    <p class="total-reviews-text" id="totalReviewsText">Based on 0 total reviews</p>
                </div>
                <div class="rating-bar-chart" id="ratingBarChart">
                    <!-- JS Filled for 5 star distributions -->
                </div>
            </div>

            <!-- Reviews Grid 3D -->
            <div class="reviews-grid-3d" id="reviewsGridContainer">
                <div class="loading-reviews">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading your reviews...</p>
                </div>
            </div>
            <!-- Pagination -->
            <div id="reviewsPaginationContainer"></div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/reviews.js"></script>
</body>

</html>
