<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Give Us Your Feedback - ShopSphere</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/feedback.css">

    <!-- Theme Sync Script (Prevents FOUC) -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>

<body>
    <!-- Animated Background Details -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <!-- Extra Sparkles for 'Attractive' requirement -->
    <div class="sparkle s1" style="top: 15%; left: 20%;">✨</div>
    <div class="sparkle s2" style="top: 25%; right: 15%;">✨</div>
    <div class="sparkle s3" style="bottom: 20%; left: 10%;">✨</div>
    <div class="sparkle s4" style="top: 10%; right: 30%;">⭐</div>

    <div class="container fade-in">
        <div class="feedback-card glass-panel slide-up">
            <header class="card-header">
                <a href="../marketplace/marketplace.html"
                    style="text-decoration: none; color: inherit; display: inline-block; margin-bottom: 1rem;">
                    <i class="fas fa-arrow-left"></i> Back to Marketplace
                </a>
                <h1 class="animate-text">Give Us Your Feedback <span class="emoji">✨</span></h1>
                <p class="subtitle">We'd love to hear your thoughts! Help us improve your experience.</p>
            </header>

            <form id="feedbackForm" class="feedback-form">
                <!-- Hidden product ID field -->
                <input type="hidden" id="product-id-hidden" name="product_id" value="">

                <!-- Visible Product ID Display - PROMINENT -->
                <div class="form-group slide-up-delay-1" style="margin-bottom: 1.5rem;">
                    <label for="product-id-display"
                        style="font-weight: 600; font-size: 1rem; color: #333; display: block; margin-bottom: 0.5rem;">Product
                        ID</label>
                    <input type="text" id="product-id-display" readonly style="
                            width: 100%;
                            padding: 12px 16px;
                            font-size: 1rem;
                            font-weight: 500;
                            background-color: #e8f4f8;
                            border: 2px solid #4a90e2;
                            border-radius: 8px;
                            cursor: not-allowed;
                            color: #2c5aa0;
                        " placeholder="Will be auto-filled from product">
                </div>

                <div class="row">
                    <div class="form-group slide-up-delay-1 half">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group slide-up-delay-1 half">
                        <label for="email">Email <span class="optional">(Optional)</span></label>
                        <input type="email" id="email" placeholder="john@example.com">
                    </div>
                </div>

                <div class="form-group slide-up-delay-2 center-align">
                    <label>Rate your experience</label>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5" /><label for="star5" title="5 stars"><i
                                class="fas fa-star"></i></label>
                        <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="4 stars"><i
                                class="fas fa-star"></i></label>
                        <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="3 stars"><i
                                class="fas fa-star"></i></label>
                        <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="2 stars"><i
                                class="fas fa-star"></i></label>
                        <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="1 star"><i
                                class="fas fa-star"></i></label>
                    </div>
                </div>

                <div class="form-group slide-up-delay-2">
                    <label>Feedback Category</label>
                    <div class="category-pills">
                        <input type="radio" name="category" id="cat-quality" value="Product Quality" checked>
                        <label for="cat-quality" class="pill">Product Quality</label>

                        <input type="radio" name="category" id="cat-service" value="Customer Service">
                        <label for="cat-service" class="pill">Customer Service</label>

                        <input type="radio" name="category" id="cat-delivery" value="Delivery">
                        <label for="cat-delivery" class="pill">Delivery</label>

                        <input type="radio" name="category" id="cat-other" value="Other">
                        <label for="cat-other" class="pill">Other</label>
                    </div>
                </div>

                <div class="form-group slide-up-delay-3">
                    <label for="message">Your Message</label>
                    <textarea id="message" rows="4" placeholder="Tell us what you liked or how we can improve..."
                        required></textarea>
                </div>

                <div class="form-group slide-up-delay-3">
                    <label>Would you recommend this product?</label>
                    <div class="recommend-toggle">
                        <input type="radio" name="recommend" id="rec-yes" value="yes" checked>
                        <label for="rec-yes" class="rec-btn yes-btn"><i class="fas fa-thumbs-up"></i> Yes</label>

                        <input type="radio" name="recommend" id="rec-no" value="no">
                        <label for="rec-no" class="rec-btn no-btn"><i class="fas fa-thumbs-down"></i> No</label>
                    </div>
                </div>

                <div class="form-group slide-up-delay-4">
                    <label for="image-upload" class="upload-label">
                        <i class="fas fa-cloud-upload-alt"></i> Upload an Image (Optional)
                    </label>
                    <input type="file" id="image-upload" accept="image/*" class="hidden-input">
                    <div id="image-preview" class="image-preview hidden"></div>
                </div>

                <div class="form-actions slide-up-delay-4">
                    <button type="button" class="btn-secondary" onclick="window.history.back()">Cancel</button>
                    <button type="submit" class="btn-primary animate-hover">
                        <span>Submit Feedback</span> <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="modal hidden">
        <div class="modal-content glass-panel center-text">
            <div class="success-icon-container">
                <i class="fas fa-check-circle success-Check"></i>
            </div>
            <h2>Thank You!</h2>
            <p>Your feedback helps us improve.</p>
            <button id="close-modal-btn" class="btn-primary"
                onclick="window.location.href='../marketplace/marketplace.html'">Return to
                Marketplace</button>
        </div>
    </div>

    <script src="../marketplace/js/storage.js"></script>
    <script src="js/feedback.js"></script>
</body>

</html>
